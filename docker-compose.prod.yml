services:
  postgres:
    image: postgres:16-alpine
    container_name: lark-summary-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lark-summary}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-lark-summary}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lark-summary}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  minio:
    image: minio/minio:latest
    container_name: lark-summary-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  minio-setup:
    image: minio/mc:latest
    container_name: lark-summary-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD};
      mc mb local/avatars --ignore-existing;
      mc anonymous set download local/avatars;
      mc mb local/attachments --ignore-existing;
      echo 'Bucket setup complete';
      exit 0;
      "
    networks:
      - internal

  migrate:
    image: ghcr.io/${GITHUB_REPOSITORY:-lark-summary/lark-summary}-migrate:${IMAGE_TAG:-latest}
    container_name: lark-summary-migrate
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    profiles:
      - migrate

  web:
    image: ghcr.io/${GITHUB_REPOSITORY:-lark-summary/lark-summary}:${IMAGE_TAG:-latest}
    container_name: lark-summary-web
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: "3000"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  docs:
    image: ghcr.io/${GITHUB_REPOSITORY:-lark-summary/lark-summary}-docs:${IMAGE_TAG:-latest}
    container_name: lark-summary-docs
    restart: unless-stopped
    environment:
      PORT: "3001"
      NODE_ENV: production
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: lark-summary-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/example.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/ssl/cloudflare:/etc/ssl/cloudflare:ro
    depends_on:
      - web
      - docs
    networks:
      - internal

volumes:
  postgres_data:
  minio_data:

networks:
  internal:
    driver: bridge
