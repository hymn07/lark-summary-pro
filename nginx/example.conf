# Docker internal DNS — re-resolves container IPs on every request
resolver 127.0.0.11 valid=10s ipv6=off;

# ── Redirect HTTP → HTTPS ──
server {
    listen 80;
    server_name example.com docs.example.com;
    return 301 https://$host$request_uri;
}

# ── Main app: example.com ──
server {
    listen 443 ssl;
    http2 on;
    server_name example.com;

    ssl_certificate     /path/to/your/ssl/cert.pem;
    ssl_certificate_key /path/to/your/ssl/key.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 50M;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    set $web_backend http://web:3000;
    set $docs_backend http://docs:3001;

    location / {
        proxy_pass $web_backend;
    }

    location /mcp/ {
        proxy_pass $web_backend;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /api/ {
        proxy_pass $web_backend;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    location /_next/static/ {
        proxy_pass $web_backend;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}

# ── Docs: docs.example.com ──
server {
    listen 443 ssl;
    http2 on;
    server_name docs.example.com;

    ssl_certificate     /path/to/your/ssl/cert.pem;
    ssl_certificate_key /path/to/your/ssl/key.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    client_max_body_size 10M;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    set $docs_backend http://docs:3001;

    location / {
        proxy_pass $docs_backend;
    }

    location /_next/static/ {
        proxy_pass $docs_backend;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}
